<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="main">

<div class="card">
<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="searchWeather()">Search</button>

<h4>Search History</h4>
<div id="history"></div>

</div>


<div class="card">
<h3>Weather Info</h3>

<table>
<tr>
<td>City</td>
<td id="city"></td>
</tr>

<tr>
<td>Temp</td>
<td id="temp"></td>
</tr>

<tr>
<td>Weather</td>
<td id="weather"></td>
</tr>

<tr>
<td>Humidity</td>
<td id="humidity"></td>
</tr>

<tr>
<td>Wind</td>
<td id="wind"></td>
</tr>

</table>

</div>

</div>


<div class="console">
<h3>Console – Event Loop</h3>
<pre id="logBox"></pre>
</div>

<script src="script.js"></script>

</body>
</html>
